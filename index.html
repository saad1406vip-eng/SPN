<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الطيبات الأسبوعي</title>
    <style>
        :root { --primary: #1b4332; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .day-badge { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 50px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .meal-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; text-align: right; border-right: 6px solid #40916c; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .meal-type { color: #666; font-size: 0.8rem; font-weight: bold; display: block; }
        .meal-title { color: var(--primary); font-size: 1.1rem; margin: 5px 0; display: block; }
        .shopping-nav { display: flex; justify-content: space-around; margin-top: 20px; background: white; padding: 15px; border-radius: 15px; }
        .btn-day { background: #d8f3dc; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        .active-day { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="current-day-label" class="day-badge">اليوم</div>
        <h1 style="margin:0">نظام الطيبات 7/7</h1>
        <p style="opacity: 0.8; font-size: 0.9rem;">وجبات نظيفة طبقاً لتعليمات د. ضياء</p>
    </div>

    <div id="meals-display">
        </div>

    <div class="shopping-nav" id="days-nav">
        </div>

    <div class="meal-card" style="border-right-color: #ff9f1c; margin-top: 20px;">
        <span class="meal-type">💡 نصيحة الطاحون</span>
        <strong class="meal-title">اطلب "نخالة القمح" فقط، وتأكد أن الطحن خشن للتوست لتجنب الجلوتين المركز.</strong>
    </div>
</div>

<script>
    const weekData = [
        { day: "الأحد", b: "توست نخالة + جبن شيدر + زيتون", l: "أرز بسمتي + لحم غنم مطهو", d: "بطاطس مسلوقة بزيت الزيتون", s: "تمر + شاي أخضر" },
        { day: "الاثنين", b: "توست نخالة + زبدة وعسل سدر", l: "حمام محشي بالأرز والكبدة", d: "توست نخالة + مربى طبيعية", s: "فواكه (تين وعنب)" },
        { day: "الثلاثاء", b: "توست نخالة + نوتيلا وموز", l: "أرز + كبدة مقلية بزيت الزيتون", d: "صحن فواكه مشكلة (مسموحة)", s: "رمان بدون بذر" },
        { day: "الأربعاء", b: "توست نخالة + جبنة جودة", l: "بطاطس مهروسة + ريش غنم", d: "توست نخالة + عسل ونخالة", s: "جوافة بدون بذور" },
        { day: "الخميس", b: "توست نخالة + زيتون وعسل", l: "أرز بسمتي + لحم جملي", d: "بطاطس بالفرن مع أعشاب", s: "تمر سكري + شاي" },
        { day: "الجمعة", b: "توست نخالة + تشكيلة أجبان مسموحة", l: "سمك مشوي (الوجبة الشهرية) + أرز", d: "فواكه خفيفة", s: "شاي أخضر بالنعناع" },
        { day: "السبت", b: "توست نخالة + زبدة ومربى", l: "أرز + حمام مشوي", d: "بطاطس مهروسة بالزبدة", s: "مشمش أو بخارة" }
    ];

    function displayDay(index) {
        const data = weekData[index];
        document.getElementById('current-day-label').innerText = data.day;
        const container = document.getElementById('meals-display');
        container.innerHTML = `
            <div class="meal-card"><span class="meal-type">الفطور</span><strong class="meal-title">${data.b}</strong></div>
            <div class="meal-card"><span class="meal-type">الغداء</span><strong class="meal-title">${data.l}</strong></div>
            <div class="meal-card"><span class="meal-type">سناك</span><strong class="meal-title">${data.s}</strong></div>
            <div class="meal-card"><span class="meal-type">العشاء</span><strong class="meal-title">${data.d}</strong></div>
        `;
        renderNav(index);
    }

    function renderNav(activeIndex) {
        const nav = document.getElementById('days-nav');
        nav.innerHTML = weekData.map((d, i) => `
            <button class="btn-day ${i === activeIndex ? 'active-day' : ''}" onclick="displayDay(${i})">
                ${d.day.filter ? d.day : d.day.substring(0, 3)}
            </button>
        `).join('');
    }

    // التعرف على اليوم الحالي تلقائياً
    const today = new Date().getDay(); // 0 = Sunday, 1 = Monday...
    displayDay(today);
</script>

</body>
</html>
